<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Telegram 授权</title>

<style>

body{
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
background:#f5f7fa;
display:flex;
align-items:center;
justify-content:center;
height:100vh;
margin:0;
}

.container{
background:white;
padding:40px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
width:360px;
}

.icon{
font-size:48px;
margin-bottom:20px;
}

.icon.success{
color:#22c55e;
}

.icon.error{
color:#ef4444;
}

#spinner{
margin-top:20px;
}

.spinner{
width:36px;
height:36px;
border:4px solid #eee;
border-top-color:#4f46e5;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
to{transform:rotate(360deg);}
}

</style>
</head>

<body>

<div class="container">

<div id="icon" class="icon">⏳</div>

<h2 id="title">处理中</h2>

<p id="subtitle">请稍候...</p>

<div id="spinner">
<div class="spinner"></div>
</div>

</div>

<script>

console.log("🚀 Bridge Page Loaded")

// ==================== popup监控变量 ====================
// 🔥新增
let telegramPopup=null
let popupCheckTimer=null
let authFinished=false

// ==================== 参数解析 ====================

const params=new URLSearchParams(location.search)

const botId=params.get("bot_id")
const flutterOrigin=params.get("flutter_origin")
const requestAccess=params.get("request_access")||"write"

// ==================== UI 辅助函数 ====================

function updateUI(title,subtitle){
document.getElementById("title").textContent=title
document.getElementById("subtitle").textContent=subtitle
}

function showSuccess(title,subtitle){
document.getElementById("icon").textContent="✓"
document.getElementById("icon").className="icon success"
document.getElementById("title").textContent=title
document.getElementById("subtitle").textContent=subtitle
document.getElementById("spinner").style.display="none"
}

function showError(title,subtitle){
document.getElementById("icon").textContent="✕"
document.getElementById("icon").className="icon error"
document.getElementById("title").textContent=title
document.getElementById("subtitle").textContent=subtitle||""
document.getElementById("spinner").style.display="none"
}

// ==================== 向父窗口发送消息 ====================

function notifyParent(type,data=null,error=null){

const message={
type:type,
data:data,
error:error,
timestamp:Date.now()
}

console.log("📤 postMessage:",message)

try{

if(window.parent && window.parent!==window){

window.parent.postMessage(message,"*")

}else if(window.opener && window.opener!==window){

window.opener.postMessage(message,"*")

}else{

console.warn("⚠️ 没有父窗口")

}

}catch(e){

console.error("postMessage失败",e)

}

}

// ==================== popup关闭检测 ====================
// 🔥新增

function startPopupMonitor(){

if(!telegramPopup) return

popupCheckTimer=setInterval(()=>{

if(telegramPopup.closed){

console.warn("⚠️ 用户关闭了 Telegram 授权窗口")

clearInterval(popupCheckTimer)

popupCheckTimer=null

if(!authFinished){

notifyParent("telegram_auth_closed")

}

}

},500)

}

// ==================== 打开Telegram授权 ====================

function openTelegramAuth(){

updateUI("等待授权","请在弹出的窗口中完成登录")

const authUrl=
`https://oauth.telegram.org/auth?bot_id=${botId}&origin=${encodeURIComponent(flutterOrigin)}&request_access=${requestAccess}`

console.log("🔗 打开Telegram:",authUrl)

telegramPopup=window.open(
authUrl,
"telegram_auth",
"width=500,height=650"
)

// 🔥新增
startPopupMonitor()

}

// ==================== 处理授权结果 ====================

function handleAuthResult(hash){

try{

// 🔥新增
authFinished=true
clearInterval(popupCheckTimer)

updateUI("验证授权","正在解析数据")

const encoded=hash.replace("#tgAuthResult=","")

const base64=encoded.replace(/-/g,"+").replace(/_/g,"/")

const decoded=atob(base64)

const json=decodeURIComponent(
decoded.split("").map(c=>
"%"+("00"+c.charCodeAt(0).toString(16)).slice(-2)
).join("")
)

const authData=JSON.parse(json)

console.log("✅ 授权数据:",authData)

showSuccess("授权成功","正在返回应用")

notifyParent("telegram_auth_success",authData)

setTimeout(()=>{

window.close()

},1500)

}catch(e){

console.error("解析失败",e)

showError("授权失败",e.message)

notifyParent("telegram_auth_error",null,e.message)

}

}

// ==================== 初始化 ====================

const hash=window.location.hash

if(hash.startsWith("#tgAuthResult=")){

console.log("📦 检测到授权返回")

handleAuthResult(hash)

}else{

console.log("⏳ 等待授权")

openTelegramAuth()

}

// 通知 Flutter bridge ready

if(window.parent!==window){

notifyParent("telegram_bridge_ready")

}

</script>

</body>
</html>
