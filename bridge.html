<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Telegram Authorization</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system;
      background: linear-gradient(135deg, #667eea, #764ba2);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    /* Hidden in iframe mode */
    body.iframe-mode {
      display: none;
    }
    .card {
      background: #fff;
      padding: 32px;
      border-radius: 16px;
      width: 100%;
      max-width: 420px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,.3);
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #e5e7eb;
      border-top-color: #667eea;
      border-radius: 50%;
      margin: 24px auto;
      animation: spin .8s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .icon {
      font-size: 48px;
      margin: 24px 0;
    }
    .success { color: #10b981; }
    .error { color: #ef4444; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon" id="icon"></div>
  <h2 id="title">Loading...</h2>
  <p id="subtitle">Please wait</p>
  <div class="spinner" id="spinner"></div>
</div>

<script>
  console.log('🚀 [Bridge] Page loaded');
  console.log('   URL:', location.href);

  // Parse URL parameters
  const params = new URLSearchParams(location.search);
  const botId = params.get('bot_id');
  const flutterOrigin = params.get('flutter_origin');
  const requestAccess = params.get('request_access') || 'write';
  const hash = location.hash;
  const hasAuthResult = hash.startsWith('#tgAuthResult=');

  // Detect current context role
  const isIframe = window.parent !== window;
  const isPopup = window.opener && window.opener !== window;

  console.log('📋 [Bridge] Environment detected:', {
    isIframe,
    isPopup,
    hasAuthResult,
    botId,
    flutterOrigin
  });

  // Execute logic based on context role
  if (isIframe) {
    runAsIframe();
  } else if (isPopup || hasAuthResult) {
    runAsPopup();
  } else {
    showError('Unknown context');
  }

  // ==================== iframe mode ====================
  function runAsIframe() {
    console.log('🌉 [Bridge] Running as: iframe');
    document.body.classList.add('iframe-mode');

    if (!botId || !flutterOrigin) {
      console.error('❌ [Bridge/iframe] Missing required parameters');
      notifyFlutter({
        type: 'telegram_auth_error',
        error: 'Configuration error: missing required parameters'
      });
      return;
    }

    // Set up message listener before opening the popup
    setupIframeMessageListener();

    // Open self as popup
    openSelfAsPopup();

    // Notify Flutter that the bridge iframe is ready
    notifyFlutter({ type: 'telegram_bridge_ready' });
  }

  function openSelfAsPopup() {
    const popupUrl = location.href;

    console.log('🪟 [Bridge/iframe] Opening new window');
    console.log('   URL:', popupUrl);

    const width = 550;
    const height = 470;
    const left = (screen.width - width) / 2;
    const top = (screen.height - height) / 2;
    const features = `width=${width},height=${height},left=${left},top=${top},menubar=no,toolbar=no,location=no,status=no`;

    const authWindow = window.open(popupUrl, 'telegram_oauth', features);

    if (!authWindow) {
      console.error('❌ [Bridge/iframe] Popup blocked by browser');
      notifyFlutter({
        type: 'telegram_auth_error',
        error: 'Popup was blocked by the browser. Please allow popups and try again.'
      });
      return;
    }

    console.log('✅ [Bridge/iframe] New window opened');

    // 🔥 Poll to detect if the user manually closes the popup.
    // authCompleted flag: set to true when a success/error message is received,
    // to avoid misidentifying a normal popup close as "user cancelled".
    let authCompleted = false;

    // Expose a global method so the message listener can signal "auth completed".
    window._markAuthCompleted = () => {
      authCompleted = true;
    };

    const pollTimer = setInterval(() => {
      if (authWindow.closed) {
        clearInterval(pollTimer);
        if (!authCompleted) {
          console.log('🚪 [Bridge/iframe] User manually closed the auth popup');
          notifyFlutter({
            type: 'telegram_auth_error',
            error: 'User cancelled authorization'
          });
        } else {
          console.log('✅ [Bridge/iframe] Popup closed, auth flow ended normally');
        }
      }
    }, 500);
  }

  function setupIframeMessageListener() {
    console.log('👂 [Bridge/iframe] Setting up message listener');

    window.addEventListener('message', (event) => {
      console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
      console.log('📨 [Bridge/iframe] Message received');
      console.log('   origin:', event.origin);
      console.log('   data:', event.data);

      // 🔥 Handle direct messages from Telegram OAuth
      if (event.origin === 'https://oauth.telegram.org') {
        console.log('📋 [Bridge/iframe] Message from Telegram OAuth');
        handleTelegramOAuthMessage(event.data);
        console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
        return;
      }

      // 🔥 Handle forwarded messages from the same-origin popup
      if (event.origin === location.origin) {
        console.log('📋 [Bridge/iframe] Message from popup');
        if (event.data && typeof event.data === 'object') {
          const { type } = event.data;
          console.log('   Message type:', type);

          if (type === 'telegram_auth_success' || type === 'telegram_auth_error') {
            // 🔥 Mark auth flow as complete to prevent poll from misreporting "user cancelled"
            if (typeof window._markAuthCompleted === 'function') {
              window._markAuthCompleted();
            }
            // Forward to Flutter
            notifyFlutter(event.data);
          }
        }
        console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
        return;
      }

      // Ignore messages from unexpected origins
      console.log('⚠️ [Bridge/iframe] Ignoring unexpected origin');
      console.log('━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━');
    });
  }

  // 🔥 Handle postMessage from Telegram OAuth (when Telegram posts directly to the iframe)
  function handleTelegramOAuthMessage(rawData) {
    console.log('🔍 [Bridge/iframe] Processing Telegram OAuth message');
    console.log('   Raw data type:', typeof rawData);
    console.log('   Raw data:', rawData);

    try {
      let data = rawData;
      if (typeof rawData === 'string') {
        console.log('   String detected, parsing as JSON');
        data = JSON.parse(rawData);
      }

      console.log('   Parsed data:', data);
      console.log('   data.event:', data?.event);
      console.log('   data.result:', data?.result);

      // Telegram message format: { event: "auth_result", result: {...}, origin: "..." }
      if (data && data.event === 'auth_result' && data.result) {
        console.log('✅ [Bridge/iframe] Telegram authorization successful');
        console.log('   Auth data:', data.result);

        // 🔥 Mark auth as completed
        if (typeof window._markAuthCompleted === 'function') {
          window._markAuthCompleted();
        }

        notifyFlutter({
          type: 'telegram_auth_success',
          data: data.result
        });

      } else if (data && data.event === 'auth_user_cancel') {
        console.log('⚠️ [Bridge/iframe] User cancelled authorization (Telegram notified)');

        // 🔥 Mark auth as completed (cancel counts as complete, prevents duplicate errors)
        if (typeof window._markAuthCompleted === 'function') {
          window._markAuthCompleted();
        }

        notifyFlutter({
          type: 'telegram_auth_error',
          error: 'User cancelled authorization'
        });

      } else {
        console.log('⚠️ [Bridge/iframe] Unknown Telegram message format');
        console.log('   Full data object:', JSON.stringify(data, null, 2));
      }
    } catch (e) {
      console.error('❌ [Bridge/iframe] Failed to process Telegram message:', e);
      console.error('   Stack:', e.stack);
      notifyFlutter({
        type: 'telegram_auth_error',
        error: 'Failed to process authorization data'
      });
    }
  }

  function notifyFlutter(message) {
    console.log('📤 [Bridge/iframe] Forwarding message to Flutter');
    console.log('   message:', message);

    if (window.parent && window.parent !== window) {
      try {
        // 🔥 Dynamically resolve parent page origin
        const targetOrigin = document.referrer ? new URL(document.referrer).origin : '*';
        console.log('   target origin:', targetOrigin);

        window.parent.postMessage(message, targetOrigin);
        console.log('✅ [Bridge/iframe] Message sent');
      } catch (e) {
        console.error('❌ [Bridge/iframe] postMessage failed:', e);
      }
    }
  }

  // ==================== Popup mode ====================
  function runAsPopup() {
    console.log('🪟 [Bridge] Running as: popup');

    if (hasAuthResult) {
      // Telegram has already redirected back (URL Hash method), process result
      handleAuthResult(hash);
    } else {
      // First open — redirect to Telegram
      redirectToTelegram();
    }
  }

  function redirectToTelegram() {
    if (!botId) {
      showError('Configuration error: missing bot_id');
      notifyOpener({
        type: 'telegram_auth_error',
        error: 'Configuration error: missing bot_id'
      });
      return;
    }

    updateUI('Redirecting...', 'Opening Telegram authorization page');

    const telegramOrigin = location.origin;
    const returnTo = location.href;
    const authUrl =
      'https://oauth.telegram.org/auth'
      + '?bot_id=' + encodeURIComponent(botId)
      + '&origin=' + encodeURIComponent(telegramOrigin)
      + '&return_to=' + encodeURIComponent(returnTo)
      + '&request_access=' + encodeURIComponent(requestAccess);

    console.log('🔐 [Bridge/popup] Redirecting to Telegram OAuth');
    console.log('   Auth URL:', authUrl);
    console.log('   Return to:', returnTo);

    setTimeout(() => {
      window.location.href = authUrl;
    }, 500);
  }

  function handleAuthResult(hash) {
    console.log('🔍 [Bridge/popup] Processing auth result (URL Hash method)');
    console.log('   Hash:', hash);

    try {
      const encoded = hash.replace('#tgAuthResult=', '');
      const base64 = encoded.replace(/-/g, '+').replace(/_/g, '/');
      const decoded = atob(base64);
      const json = decodeURIComponent(
        decoded.split('').map(c =>
          '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2)
        ).join('')
      );
      const data = JSON.parse(json);

      console.log('✅ [Bridge/popup] Authorization successful:', data);

      showSuccess('Authorized', 'Returning...');

      // Notify opener (iframe)
      notifyOpener({
        type: 'telegram_auth_success',
        data: data
      });

      // Close after a short delay
      setTimeout(() => {
        console.log('🚪 [Bridge/popup] Closing window');
        window.close();
      }, 1500);

    } catch (e) {
      console.error('❌ [Bridge/popup] Parse failed:', e);

      showError('Authorization failed', 'Failed to parse data: ' + e.message);

      notifyOpener({
        type: 'telegram_auth_error',
        error: 'Failed to parse authorization data: ' + e.message
      });

      setTimeout(() => {
        window.close();
      }, 2000);
    }
  }

  function notifyOpener(message) {
    console.log('📤 [Bridge/popup] Notifying opener');
    console.log('   message:', message);

    if (window.opener && window.opener !== window) {
      try {
        window.opener.postMessage(message, '*');
        console.log('✅ [Bridge/popup] Message sent');
      } catch (e) {
        console.error('❌ [Bridge/popup] postMessage failed:', e);
      }
    } else {
      console.error('⚠️ [Bridge/popup] window.opener unavailable');
    }
  }

  // ==================== UI helpers ====================
  function updateUI(title, subtitle) {
    document.getElementById('title').textContent = title;
    document.getElementById('subtitle').textContent = subtitle;
  }

  function showSuccess(title, subtitle) {
    document.getElementById('icon').textContent = '✓';
    document.getElementById('icon').className = 'icon success';
    document.getElementById('title').textContent = title;
    document.getElementById('subtitle').textContent = subtitle;
    document.getElementById('spinner').style.display = 'none';
  }

  function showError(title, subtitle) {
    document.getElementById('icon').textContent = '✕';
    document.getElementById('icon').className = 'icon error';
    document.getElementById('title').textContent = title;
    document.getElementById('subtitle').textContent = subtitle || '';
    document.getElementById('spinner').style.display = 'none';
  }
</script>
</body>
</html>
